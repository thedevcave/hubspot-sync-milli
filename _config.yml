title: HubSpot Sync - Milli Docs
description: Complete documentation for the HubSpot WooCommerce integration plugin
url: "https://thedevcave.github.io"
baseurl: "/hubspot-sync-milli"

# Theme
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap

# GitHub Pages settings
github_username: thedevcave
repository: hubspot-sync-milli

# Markdown settings
markdown: kramdown
highlighter: rouge

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:name/

# Navigation
header_pages:
  - docs/ABANDONED_CART.md
  - docs/SERIAL_NUMBERS.md
  - docs/HOOKS_AND_TRIGGERS.md
  - docs/CHECKOUT_FIELDS.md

# Build settings
exclude:
  - vendor/
  - tests/
  - examples/
  - "*.php"
  - composer.json
  - composer.lock
  - .gitignore
  - .gitattributes

# Include docs in build
include:
  - docs/